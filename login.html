<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In &mdash; TestBank</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-icon">&#9670;</span>
      TestBank
    </a>
    <nav class="nav-right">
      <a class="nav-link" href="index.html">&#8592; Back</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <main class="container">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your TestBank account</p>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" placeholder="e.g. jsmith" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" required>
        </div>

        <button class="btn btn-full" type="submit">&#128274;&nbsp; Sign In</button>
        <p id="error" class="error" aria-live="polite"></p>
      </form>

      <div class="divider">or</div>
      <p style="text-align:center;font-size:13px;color:#64748b">
        Need help? <a class="link" href="index.html">Return to home</a>
      </p>
    </main>
  </div>

  <footer class="page-footer">&copy; 2026 TestBank Demo &mdash; For testing purposes only.</footer>
  <script>
  // Inline app JS (login page)
  function handleLogin(e){
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('error');
    err.textContent = '';
    const allowed = {
      jsmith: { password: 'Demo1234', displayName: 'John Smith' },
      bmars:  { password: 'pass1234', displayName: 'Brian Mars' },
      tswift: { password: 'pass1234', displayName: 'Taylor Swift' }
    };
    const acct = allowed[u];
    if(acct && acct.password === p){
      sessionStorage.setItem('user', u);
      sessionStorage.setItem('displayName', acct.displayName);
      window.location.href = 'dashboard.html';
      return false;
    }
    err.textContent = 'Invalid username or password.';
    return false;
  }
  </script>
</body>
</html>
